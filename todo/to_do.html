<div data-iq.if="!items.length">
	Nothing here yet. Why don't you add something below?
</div>

<ul data-iq.if="items.length">
	<to-do-item
		data-iq.for="item of items"
		data-iq.todo="item"
		data-iq:itemDeleted="handleDelete">
	</to-do-item>
</ul>

<input
	data-iq:input="setEmpty"
	type="text"
	class="todo"
	placeholder="to do">
<button
	data-iq:click="add"
	data-iq.disabled="isEmpty">
		add
</button>
<button
	data-iq:click="clear"
	data-iq.disabled="!items.length"
	class="remove">
		remove all
</button>
